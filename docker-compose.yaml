services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tournament-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: tournament-frontend
    ports:
      - "3000:3000"
